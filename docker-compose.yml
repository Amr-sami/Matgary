services:
  postgres:
    image: postgres:16-alpine
    container_name: matgary-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: matgary
      POSTGRES_PASSWORD: matgary
      POSTGRES_DB: matgary
    ports:
      - "5434:5432"
    volumes:
      - matgary_pg_data:/var/lib/postgresql/data
      - ./infra/init-postgres.sql:/docker-entrypoint-initdb.d/00-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U matgary -d matgary"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Redis is used as an opportunistic cache + rate-limiter (lib/redis.ts,
  # lib/cache.ts, lib/ratelimit.ts). The app degrades gracefully if it's down,
  # so no AOF/RDB persistence — treat data here as ephemeral. allkeys-lru lets
  # a runaway cache evict itself instead of OOMing the host.
  redis:
    image: redis:7-alpine
    container_name: matgary-redis
    restart: unless-stopped
    command:
      - redis-server
      - --maxmemory
      - 256mb
      - --maxmemory-policy
      - allkeys-lru
      - --save
      - ""
      - --appendonly
      - "no"
    ports:
      - "6381:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Nightly database dumps with retention. The container holds nothing but a
  # cron daemon, the pg client, and our scripts — every dump lands in the
  # ./backups bind mount on the host so it survives container destruction
  # and can be rsync'd to off-site by a host-level job.
  #
  # Default schedule: 02:30 UTC every day (~04:30 Cairo time). Override via
  # the BACKUP_CRON env var if you want a different time.
  backup:
    image: postgres:16-alpine
    container_name: matgary-backup
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGHOST: postgres
      PGPORT: "5432"
      PGUSER: matgary
      PGPASSWORD: matgary
      PGDATABASE: matgary
      BACKUP_DIR: /backups
      BACKUP_CRON: "30 2 * * *"
      DAILY_KEEP: "14"
      WEEKLY_KEEP: "8"
    volumes:
      - ./infra/backup.sh:/usr/local/bin/backup.sh:ro
      - ./infra/restore.sh:/usr/local/bin/restore.sh:ro
      - ./backups:/backups
    entrypoint:
      - sh
      - -c
      - |
        set -e
        # Materialise crontab from $$BACKUP_CRON. Use BusyBox's crond.
        echo "$$BACKUP_CRON /usr/local/bin/backup.sh >> /var/log/backup.log 2>&1" > /etc/crontabs/root
        # Run one immediate backup so a fresh deploy is protected before the
        # first scheduled tick (only if no dump exists yet).
        if ! ls /backups/*.sql.gz >/dev/null 2>&1; then
          /usr/local/bin/backup.sh || echo "[backup] initial run failed (non-fatal)"
        fi
        echo "[backup] cron schedule: $$BACKUP_CRON"
        # crond -f keeps the container in the foreground; -d 8 = info-level.
        exec crond -f -d 8

  # Periodic application cron — pokes the app's internal cron routes on a
  # schedule. Today: hourly recurring-expense materialisation. Container holds
  # nothing but BusyBox (curl + crond), so no app code, no DB creds, no
  # secrets except the bearer token below.
  #
  # Production wiring:
  #   - CRON_SECRET must match the app's CRON_SECRET env var.
  #   - CRON_TARGET_URL must point to a host the sidecar can reach. The
  #     `extra_hosts` line maps `host.docker.internal` to the host gateway on
  #     Linux (it already resolves on Mac/Windows); use that when the Next
  #     server runs on the host outside compose. If you wrap the Next service
  #     into this compose later, change CRON_TARGET_URL to `http://app:3000`
  #     and you can drop extra_hosts.
  cron:
    image: alpine:3.20
    container_name: matgary-cron
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      CRON_SECRET: "${CRON_SECRET:-}"
      CRON_TARGET_URL: "${CRON_TARGET_URL:-http://host.docker.internal:3000}"
      RECURRING_EXPENSES_CRON: "0 * * * *"
      ACTIVITY_CLEANUP_CRON: "30 3 * * *"
    entrypoint:
      - sh
      - -c
      - |
        set -e
        apk add --no-cache curl tini >/dev/null
        if [ -z "$$CRON_SECRET" ]; then
          echo "[cron] CRON_SECRET not set — refusing to start."
          exit 1
        fi
        # Materialise env into a root-only file the wrapper sources at run-time.
        # Keeps the secret out of crontab listings and process args.
        umask 077
        printf 'CRON_SECRET=%s\nCRON_TARGET_URL=%s\n' \
          "$$CRON_SECRET" "$$CRON_TARGET_URL" > /etc/cron-env
        # Generic poker — endpoint passed as $1, label as $2.
        cat > /usr/local/bin/poke-cron.sh <<'WRAPPER'
        #!/bin/sh
        set -e
        . /etc/cron-env
        endpoint="$1"
        label="$2"
        curl -fsS -X POST \
          -H "Authorization: Bearer $CRON_SECRET" \
          "$CRON_TARGET_URL$endpoint" \
          | sed "s|^|[cron $label] |"
        WRAPPER
        chmod 700 /usr/local/bin/poke-cron.sh
        {
          echo "$$RECURRING_EXPENSES_CRON /usr/local/bin/poke-cron.sh /api/cron/recurring-expenses recurring-expenses >> /var/log/cron.log 2>&1"
          echo "$$ACTIVITY_CLEANUP_CRON /usr/local/bin/poke-cron.sh /api/cron/activity-log-cleanup activity-cleanup >> /var/log/cron.log 2>&1"
        } > /etc/crontabs/root
        echo "[cron] recurring-expenses schedule: $$RECURRING_EXPENSES_CRON"
        echo "[cron] activity-cleanup   schedule: $$ACTIVITY_CLEANUP_CRON"
        echo "[cron] target: $$CRON_TARGET_URL"
        # `tini` reaps zombies; crond -f keeps the container alive.
        exec tini -- crond -f -d 8

volumes:
  matgary_pg_data:
